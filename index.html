<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>패션 마켓 대시보드</title>
<style>
  :root {
    color-scheme: light;
    --surface-1:      #fcfcfb;
    --page:           #f9f9f7;
    --text-primary:   #0b0b0b;
    --text-secondary: #52514e;
    --text-muted:     #898781;
    --gridline:       #e1e0d9;
    --border:         rgba(11,11,11,0.10);
    --series-blue:    #2a78d6;
    --series-green:   #008300;
    --series-magenta: #e87ba4;
    --series-yellow:  #eda100;
    --series-aqua:    #1baf7a;
    --series-orange:  #eb6834;
    --series-red:     #e34948;
    --card-shadow: 0 1px 2px rgba(11,11,11,0.06);
  }
  @media (prefers-color-scheme: dark) {
    :root:where(:not([data-theme="light"])) {
      color-scheme: dark;
      --surface-1:      #1a1a19;
      --page:           #0d0d0d;
      --text-primary:   #ffffff;
      --text-secondary: #c3c2b7;
      --text-muted:     #898781;
      --gridline:       #2c2c2a;
      --border:         rgba(255,255,255,0.10);
      --series-blue:    #3987e5;
      --series-green:   #008300;
      --series-magenta: #d55181;
      --series-yellow:  #c98500;
      --series-aqua:    #199e70;
      --series-orange:  #d95926;
      --series-red:     #e66767;
      --card-shadow: 0 1px 2px rgba(0,0,0,0.4);
    }
  }
  :root[data-theme="dark"] {
    color-scheme: dark;
    --surface-1:      #1a1a19;
    --page:           #0d0d0d;
    --text-primary:   #ffffff;
    --text-secondary: #c3c2b7;
    --text-muted:     #898781;
    --gridline:       #2c2c2a;
    --border:         rgba(255,255,255,0.10);
    --series-blue:    #3987e5;
    --card-shadow: 0 1px 2px rgba(0,0,0,0.4);
  }

  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--page);
    color: var(--text-primary);
    font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    font-size: 14px;
  }
  a { color: inherit; text-decoration: none; }
  .wrap { max-width: 1400px; margin: 0 auto; padding: 20px 20px 60px; }

  header.top {
    display: flex; align-items: baseline; justify-content: space-between;
    margin-bottom: 20px; flex-wrap: wrap; gap: 8px;
  }
  header.top h1 { font-size: 20px; margin: 0; }
  header.top .sub { color: var(--text-muted); font-size: 12px; }
  header.top .badge {
    font-size: 11px; color: var(--text-muted); border: 1px solid var(--border);
    border-radius: 999px; padding: 4px 10px;
  }

  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 16px; margin-bottom: 16px; align-items: start; }
  .grid.cols-3 { grid-template-columns: repeat(3, 1fr); }
  @media (max-width: 900px) { .grid.cols-3 { grid-template-columns: 1fr; } }

  .card {
    background: var(--surface-1); border: 1px solid var(--border); border-radius: 10px;
    padding: 16px; box-shadow: var(--card-shadow);
  }
  .card h2 {
    font-size: 14px; margin: 0 0 12px; display: flex; align-items: baseline; justify-content: space-between;
  }
  .card h2 .tag { font-size: 11px; color: var(--text-muted); font-weight: 400; }

  .weather-temp { font-size: 34px; font-weight: 700; line-height: 1; }
  .weather-row { display: flex; align-items: center; gap: 14px; margin-bottom: 10px; }
  .weather-label { color: var(--text-secondary); font-size: 13px; }
  .weather-stats { display: flex; gap: 16px; font-size: 12px; color: var(--text-secondary); margin-bottom: 10px; }
  .weather-stats b { color: var(--text-primary); }
  .weather-summary { font-size: 12.5px; color: var(--text-secondary); line-height: 1.5; margin-bottom: 10px; }
  .week-forecast { display: flex; gap: 4px; overflow-x: auto; margin-bottom: 12px; padding-bottom: 2px; }
  .week-day-cell { flex: 1 0 0; min-width: 56px; text-align: center; padding: 6px 2px; border-radius: 6px; cursor: pointer; }
  .week-day-cell:hover { background: var(--gridline); }
  .week-day-cell.is-selected { background: var(--series-blue); }
  .week-day-cell.is-selected .wd-label, .week-day-cell.is-selected .wd-date,
  .week-day-cell.is-selected .wd-icon, .week-day-cell.is-selected .wd-temp,
  .week-day-cell.is-selected .wd-temp .wd-min, .week-day-cell.is-selected .wd-rain { color: #fff; }
  .day-detail-title { font-size: 12px; font-weight: 600; padding: 8px 0 4px; border-top: 1px solid var(--gridline); margin-top: 4px; }
  .wd-label { font-size: 11px; color: var(--text-secondary); font-weight: 600; }
  .wd-date { font-size: 10px; color: var(--text-muted); margin-bottom: 4px; }
  .wd-icon { font-size: 10.5px; color: var(--text-secondary); height: 2.4em; line-height: 1.2; margin-bottom: 4px; }
  .wd-temp { font-size: 11.5px; font-variant-numeric: tabular-nums; }
  .wd-temp .wd-max { font-weight: 600; }
  .wd-temp .wd-min { color: var(--text-muted); }
  .wd-rain { font-size: 10px; color: var(--series-blue); margin-top: 3px; }
  .suggest-item { padding: 8px 0; border-top: 1px solid var(--gridline); font-size: 12.5px; }
  .suggest-item b { display: inline-block; margin-right: 6px; }
  .suggest-item span { color: var(--text-secondary); }

  .news-item { padding: 9px 0; border-top: 1px solid var(--gridline); }
  .news-item:first-child { border-top: none; }
  .news-item a { display: block; font-size: 13px; margin-bottom: 3px; }
  .news-item a:hover { color: var(--series-blue); }
  .news-item .meta { font-size: 11px; color: var(--text-muted); }

  .scroll-box { max-height: 340px; overflow-y: auto; }
  .kw-list { list-style: none; margin: 0; padding: 0; max-height: 340px; overflow-y: auto; }
  .kw-list li {
    display: flex; align-items: center; gap: 8px; padding: 6px 0;
    border-top: 1px solid var(--gridline); font-size: 13px;
  }
  .kw-list li:first-child { border-top: none; }
  .kw-rank { width: 18px; color: var(--text-muted); font-size: 12px; text-align: right; }
  .kw-word { flex: 1; }
  .kw-delta { font-size: 11px; }
  .kw-delta.up { color: var(--series-red); }
  .kw-delta.down { color: var(--series-blue); }
  .kw-cat-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
  .li-thumb { width: 36px; height: 36px; object-fit: cover; border-radius: 6px; flex-shrink: 0; }
  .discount-price { display: flex; flex-direction: column; align-items: flex-end; font-size: 12px; white-space: nowrap; flex-shrink: 0; }
  .discount-price .price-final { font-weight: 600; margin-left: 0; }
  .discount-price .price-orig { color: var(--text-muted); text-decoration: line-through; font-size: 11px; margin-left: 0; }

  .tabs { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; }
  .tab-btn {
    border: 1px solid var(--border); background: transparent; color: var(--text-secondary);
    padding: 6px 12px; border-radius: 999px; font-size: 12.5px; cursor: pointer;
  }
  .tab-btn.active { background: var(--series-blue); color: #fff; border-color: var(--series-blue); }

  table.rank-table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
  table.rank-table th {
    text-align: left; color: var(--text-muted); font-weight: 500; font-size: 11px;
    padding: 6px 8px; border-bottom: 1px solid var(--gridline);
  }
  table.rank-table td { padding: 8px; border-bottom: 1px solid var(--gridline); vertical-align: middle; }
  table.rank-table img { width: 40px; height: 40px; object-fit: cover; border-radius: 6px; }
  .prod-name { max-width: 320px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; display: block; }
  .prod-brand { color: var(--text-muted); font-size: 11px; }
  .price-final { font-weight: 600; }
  .price-orig { color: var(--text-muted); text-decoration: line-through; font-size: 11px; margin-left: 6px; }
  .discount { color: var(--series-red); font-weight: 600; }
  .new-badge { background: var(--series-green); color: #fff; font-size: 10px; padding: 1px 6px; border-radius: 4px; margin-left: 6px; }

  .product-card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; }
  #hot-products { grid-template-columns: repeat(5, 1fr); }
  @media (max-width: 700px) { #hot-products { grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); } }
  #new-products {
    display: flex; overflow-x: auto; gap: 12px; scroll-snap-type: x proximity;
    cursor: grab;
  }
  #new-products.dragging { cursor: grabbing; scroll-snap-type: none; user-select: none; }
  #new-products .product-card { flex: 0 0 calc((100% - 4 * 12px) / 5); scroll-snap-align: start; }
  @media (max-width: 700px) { #new-products .product-card { flex-basis: 110px; } }
  .product-card { border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
  .product-card img { width: 100%; aspect-ratio: 1; object-fit: cover; display: block; }
  .product-card .pc-body { padding: 8px; }
  .product-card .pc-brand { font-size: 11px; color: var(--text-muted); }
  .product-card .pc-name {
    font-size: 12px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    overflow: hidden; height: 2.6em; margin: 2px 0 4px;
  }
  .product-card .pc-price { font-size: 12.5px; font-weight: 600; }
  .product-card .pc-discount { color: var(--series-red); font-size: 12px; margin-right: 4px; }

  .bar-chart { display: flex; flex-direction: column; gap: 10px; max-height: 340px; overflow-y: auto; }
  #rank-table-wrap { max-height: 480px; overflow-y: auto; }
  .bar-row { display: grid; grid-template-columns: 96px 1fr 60px; align-items: center; gap: 10px; font-size: 12px; }
  .bar-track { background: var(--gridline); border-radius: 4px; height: 14px; overflow: hidden; }
  .bar-fill { background: var(--series-blue); height: 100%; border-radius: 4px 0 0 4px; }
  .bar-value { text-align: right; color: var(--text-secondary); font-variant-numeric: tabular-nums; }

  .legend { display: flex; gap: 14px; font-size: 11px; color: var(--text-secondary); margin-bottom: 10px; }
  .legend .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 4px; }

  .muted-note { font-size: 11px; color: var(--text-muted); margin-top: 8px; }
  .loading { color: var(--text-muted); font-size: 12.5px; padding: 20px 0; text-align: center; }
  footer.foot { text-align: center; color: var(--text-muted); font-size: 11px; padding: 24px 0 0; }
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <div>
      <h1>MD 대시보드</h1>
      <div class="sub">데이터 기반 실시간</div>
    </div>
    <div class="badge" id="updated-badge">불러오는 중...</div>
  </header>

  <div class="grid cols-3">
    <div class="card" id="weather-card"><h2>서울 날씨</h2><div class="loading">불러오는 중...</div></div>
    <div class="card" id="news-card"><h2>패션 이슈</h2><div class="loading">불러오는 중...</div></div>
    <div class="card">
      <h2>검색어 트렌드</h2>
      <div class="tabs" id="kw-tabs">
        <button class="tab-btn active" data-kw="ms-pop">무신사 인기</button>
        <button class="tab-btn" data-kw="ms-rise">무신사 급상승</button>
        <button class="tab-btn" data-kw="naver">네이버 인기</button>
      </div>
      <ul class="kw-list" id="kw-list"><li class="loading">불러오는 중...</li></ul>
    </div>
  </div>

  <div class="card" style="margin-bottom:16px;">
    <h2>실시간 랭킹 <span class="tag" id="rank-updated"></span></h2>
    <div class="tabs" id="platform-tabs">
      <button class="tab-btn active" data-platform="musinsa">무신사</button>
      <button class="tab-btn" data-platform="29cm">29CM</button>
    </div>
    <div class="tabs" id="category-tabs"></div>
    <div id="rank-table-wrap"><div class="loading">불러오는 중...</div></div>
  </div>

  <div class="grid">
    <div class="card">
      <h2>인기 급상승 <span class="tag">TOP 5</span></h2>
      <div class="product-card-grid" id="hot-products"><div class="loading">불러오는 중...</div></div>
    </div>
    <div class="card">
      <h2>신규 진입 브랜드</h2>
      <div class="product-card-grid" id="new-products"><div class="loading">불러오는 중...</div></div>
    </div>
  </div>

  <div class="grid">
    <div class="card">
      <h2>할인 특가 <span class="tag">할인율 TOP 10</span></h2>
      <ul class="kw-list" id="discount-list"><li class="loading">불러오는 중...</li></ul>
    </div>
    <div class="card">
      <h2>카테고리별 평균 가격대 <span class="tag">무신사 기준</span></h2>
      <div class="tabs" id="gender-tabs">
        <button class="tab-btn active" data-gender="all">전체</button>
        <button class="tab-btn" data-gender="male">남자</button>
        <button class="tab-btn" data-gender="female">여자</button>
      </div>
      <div class="bar-chart" id="price-chart"><div class="loading">불러오는 중...</div></div>
    </div>
  </div>

  <footer class="foot">공개 데이터 기반 자동 생성 대시보드 · 자사 매출/브랜드 정보는 포함하지 않습니다.</footer>
</div>

<script>
const DATA_BASE = "data";
const state = { musinsa: null, cm29: null, searchTrends: null, naverTrends: null, weather: null, news: null, categoryPriceByGender: null };

async function loadJson(name) {
  try {
    const res = await fetch(`${DATA_BASE}/${name}?t=${Date.now()}`);
    if (!res.ok) throw new Error(res.status);
    return await res.json();
  } catch (e) {
    console.error("failed to load", name, e);
    return null;
  }
}

function fmtPrice(n) { return n == null ? "-" : n.toLocaleString("ko-KR") + "원"; }
function timeAgo(iso) {
  if (!iso) return "";
  const d = new Date(iso);
  return d.toLocaleString("ko-KR", { month: "numeric", day: "numeric", hour: "2-digit", minute: "2-digit" });
}

function buildDaySuggestions(day) {
  const items = [];
  const tMax = Math.round(day.tMax), tMin = Math.round(day.tMin), precip = day.precipProb, label = day.weatherLabel || "";

  if (tMax >= 30) {
    items.push({ item: "반팔 티셔츠 / 린넨 셔츠", reason: `최고 ${tMax}°C — 무더운 날씨, 통기성 좋은 여름 상의 수요 증가 예상` });
    items.push({ item: "반바지 / 숏 팬츠", reason: "더운 날씨로 시원한 하의 카테고리 인기 상승 전망" });
  } else if (tMax >= 25) {
    items.push({ item: "반팔 티셔츠", reason: `최고 ${tMax}°C — 무난한 여름 날씨` });
  } else if (tMax >= 18) {
    items.push({ item: "얇은 긴팔 / 가디건", reason: `최고 ${tMax}°C — 선선한 날씨, 얇은 겉옷 수요` });
  } else if (tMax >= 10) {
    items.push({ item: "자켓 / 니트", reason: `최고 ${tMax}°C — 쌀쌀한 날씨, 보온 아이템 수요` });
  } else {
    items.push({ item: "패딩 / 두꺼운 아우터", reason: `최고 ${tMax}°C — 추운 날씨, 방한 아이템 수요 증가` });
  }

  if (precip >= 60) {
    items.push({ item: "우산 / 방수 재킷", reason: `강수확률 ${precip}% — 비 대비 아이템 수요 기대` });
  } else if (precip >= 30) {
    items.push({ item: "가벼운 방수 아우터", reason: `강수확률 ${precip}% — 갑작스런 비 대비 수요` });
  }

  if (label.includes("눈")) {
    items.push({ item: "방한 부츠 / 장갑", reason: "눈 예보 — 방한/방설 잡화 수요 기대" });
  }

  if (tMax - tMin >= 10) {
    items.push({ item: "가벼운 겉옷", reason: `일교차 ${tMax - tMin}°C — 아침/저녁용 겉옷 수요` });
  }

  if (tMax >= 27 && !label.includes("비") && !label.includes("눈")) {
    items.push({ item: "선글라스 / 모자", reason: "맑고 더운 날 — 자외선 차단 잡화 판매 상승 기대" });
  }

  return items;
}

function renderDayDetail(idx) {
  const w = state.weather;
  if (!w?.days?.[idx]) return;
  state.selectedDayIdx = idx;
  document.querySelectorAll(".week-day-cell").forEach((el, i) => el.classList.toggle("is-selected", i === idx));
  const day = w.days[idx];
  const items = buildDaySuggestions(day);
  const box = document.getElementById("day-suggestions");
  box.innerHTML = `
    <div class="day-detail-title">${day.dayLabel} (${day.date.slice(5).replace("-", ".")}) · ${day.weatherLabel} · ${Math.round(day.tMin)}° / ${Math.round(day.tMax)}° · 강수 ${day.precipProb}%</div>
    ${items.map(s => `<div class="suggest-item"><b>${s.item}</b><span>${s.reason}</span></div>`).join("") || "<div class='muted-note'>특이 판매 예측 없음</div>"}
  `;
}

function renderWeather(w) {
  const el = document.getElementById("weather-card");
  if (!w) { el.innerHTML = "<h2>서울 날씨</h2><div class='loading'>데이터 없음</div>"; return; }
  const week = (w.days || []).map((d, i) => `
    <div class="week-day-cell ${i === 0 ? "is-selected" : ""}" data-day-idx="${i}">
      <div class="wd-label">${d.dayLabel}</div>
      <div class="wd-date">${d.date.slice(5).replace("-", ".")}</div>
      <div class="wd-icon">${d.weatherLabel}</div>
      <div class="wd-temp"><span class="wd-min">${Math.round(d.tMin)}°</span> / <span class="wd-max">${Math.round(d.tMax)}°</span></div>
      <div class="wd-rain">☔${d.precipProb}%</div>
    </div>
  `).join("");
  el.innerHTML = `
    <h2>서울 날씨 <span class="tag">${w.source || ""}</span></h2>
    <div class="weather-row">
      <div class="weather-temp">${Math.round(w.current.temp)}°C</div>
      <div class="weather-label">${w.current.weatherLabel}</div>
    </div>
    <div class="weather-stats">
      <span>체감 <b>${w.current.feelsLike}°C</b></span>
      <span>습도 <b>${w.current.humidity}%</b></span>
      <span>바람 <b>${w.current.windSpeed}m/s</b></span>
    </div>
    <div class="week-forecast">${week}</div>
    <div class="weather-summary">${w.week.summary}</div>
    <div id="day-suggestions"></div>
  `;
  el.querySelectorAll(".week-day-cell").forEach(cell => {
    cell.addEventListener("click", () => renderDayDetail(Number(cell.dataset.dayIdx)));
  });
  renderDayDetail(0);
}

function renderNews(n) {
  const el = document.getElementById("news-card");
  if (!n || !n.items?.length) { el.innerHTML = "<h2>패션 이슈</h2><div class='loading'>데이터 없음</div>"; return; }
  el.innerHTML = `<h2>패션 이슈</h2><div class="scroll-box">` + n.items.slice(0, 8).map(item => `
    <div class="news-item">
      <a href="${item.link}" target="_blank" rel="noopener">${item.title}</a>
      <div class="meta">${item.source || ""}</div>
    </div>
  `).join("") + `</div>`;
}

function renderKeywords(kind) {
  const el = document.getElementById("kw-list");
  let list = [];
  if (kind === "ms-pop") list = (state.searchTrends?.popular || []).map(k => ({ word: k.keyword, delta: k.rankIncrement }));
  if (kind === "ms-rise") list = (state.searchTrends?.rising || []).map(k => ({ word: k.keyword, delta: k.rankIncrement }));
  if (kind === "naver") list = (state.naverTrends?.musinsa || []).map(k => ({ word: k.keyword, delta: k.change, cat: k.cat, catColor: k.catColor }));
  if (!list.length) { el.innerHTML = "<li class='loading'>데이터 없음</li>"; return; }
  el.innerHTML = list.slice(0, 10).map((k, i) => `
    <li>
      <span class="kw-rank">${i + 1}</span>
      <span class="kw-word">${k.word}</span>
      ${k.delta ? `<span class="kw-delta ${k.delta > 0 ? "up" : "down"}">${k.delta > 0 ? "▲" : "▼"}${Math.abs(k.delta)}</span>` : ""}
    </li>
  `).join("");
}

function currentPlatformData() {
  const platform = document.querySelector("#platform-tabs .tab-btn.active").dataset.platform;
  return platform === "29cm" ? state.cm29 : state.musinsa;
}

function isMusinsaPlatform() {
  return document.querySelector("#platform-tabs .tab-btn.active").dataset.platform !== "29cm";
}

function renderCategoryTabs() {
  const el = document.getElementById("category-tabs");
  let codes, labelOf;
  if (isMusinsaPlatform()) {
    // 커넥트킨록's old scraped codes drifted from Musinsa's current taxonomy (Musinsa renumbered
    // subcategories since); this freshly-scraped, code-verified set replaces it for 무신사 tabs.
    const cats = state.categoryPriceByGender?.categories || {};
    codes = Object.keys(cats);
    labelOf = code => cats[code].label;
  } else {
    const data = currentPlatformData();
    if (!data) return;
    codes = Object.keys(data.categories || {}).filter(c => c !== "");
    labelOf = code => data.categories[code][0]?.categoryLabel || code;
  }
  el.innerHTML = `<button class="tab-btn active" data-cat="__all__">전체</button>` +
    codes.map(code => `<button class="tab-btn" data-cat="${code}">${labelOf(code)}</button>`).join("");
  el.querySelectorAll(".tab-btn").forEach(btn => btn.addEventListener("click", () => {
    el.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    renderRankTable();
  }));
}

function renderRankTable() {
  const data = currentPlatformData();
  const wrap = document.getElementById("rank-table-wrap");
  const updatedEl = document.getElementById("rank-updated");
  if (!data) { wrap.innerHTML = "<div class='loading'>데이터 없음</div>"; return; }
  const activeCat = document.querySelector("#category-tabs .tab-btn.active")?.dataset.cat || "__all__";

  let rows, updatedAt;
  if (isMusinsaPlatform() && activeCat !== "__all__") {
    const cat = state.categoryPriceByGender?.categories?.[activeCat];
    rows = (cat?.items || []).slice(0, 20);
    updatedAt = state.categoryPriceByGender?.updatedAt;
  } else {
    rows = (activeCat === "__all__" ? data.items : (data.categories?.[activeCat] || [])).slice(0, 20);
    updatedAt = data.updatedAt;
  }
  updatedEl.textContent = timeAgo(updatedAt) + " 기준";
  wrap.innerHTML = `
    <table class="rank-table">
      <thead><tr><th>순위</th><th>상품</th><th>가격</th><th>할인율</th></tr></thead>
      <tbody>
        ${rows.map(item => `
          <tr>
            <td>${item.rank}</td>
            <td>
              <div style="display:flex; align-items:center; gap:8px;">
                <img src="${item.imgUrl}" loading="lazy" alt="">
                <div>
                  <a href="${item.productUrl}" target="_blank" rel="noopener" class="prod-name">${item.name}</a>
                  <div class="prod-brand">${item.brand}${item.change === "NEW" ? "<span class='new-badge'>NEW</span>" : ""}</div>
                </div>
              </div>
            </td>
            <td><span class="price-final">${fmtPrice(item.finalPrice)}</span>${item.discountRate ? `<span class="price-orig">${fmtPrice(item.originalPrice)}</span>` : ""}</td>
            <td>${item.discountRate ? `<span class="discount">-${item.discountRate}%</span>` : "-"}</td>
          </tr>
        `).join("")}
      </tbody>
    </table>
  `;
}

function enableDragScroll(el) {
  let isDown = false, startX = 0, scrollLeft = 0, moved = false;
  el.addEventListener("mousedown", (e) => {
    isDown = true; moved = false;
    el.classList.add("dragging");
    startX = e.pageX;
    scrollLeft = el.scrollLeft;
  });
  window.addEventListener("mouseup", () => { isDown = false; el.classList.remove("dragging"); });
  el.addEventListener("mousemove", (e) => {
    if (!isDown) return;
    const dx = e.pageX - startX;
    if (Math.abs(dx) > 5) moved = true;
    el.scrollLeft = scrollLeft - dx;
  });
  el.addEventListener("click", (e) => {
    if (moved) { e.preventDefault(); e.stopPropagation(); }
  }, true);
}

function renderProductCards(elId, items) {
  const el = document.getElementById(elId);
  if (!items?.length) { el.innerHTML = "<div class='loading'>데이터 없음</div>"; return; }
  el.innerHTML = items.map(item => `
    <a class="product-card" href="${item.productUrl}" target="_blank" rel="noopener">
      <img src="${item.imgUrl}" loading="lazy" alt="">
      <div class="pc-body">
        <div class="pc-brand">${item.brand}</div>
        <div class="pc-name">${item.name}</div>
        <div class="pc-price">
          ${item.discountRate ? `<span class="pc-discount">-${item.discountRate}%</span>` : ""}
          ${fmtPrice(item.finalPrice)}
        </div>
      </div>
    </a>
  `).join("");
}

function renderDiscountList() {
  const el = document.getElementById("discount-list");
  const data = currentPlatformData();
  if (!data) { el.innerHTML = "<li class='loading'>데이터 없음</li>"; return; }
  const top = [...data.items].sort((a, b) => b.discountRate - a.discountRate).slice(0, 10);
  el.innerHTML = top.map((item, i) => `
    <li class="discount-row">
      <span class="kw-rank">${i + 1}</span>
      <img class="li-thumb" src="${item.imgUrl}" loading="lazy" alt="">
      <span class="kw-word">
        <a href="${item.productUrl}" target="_blank" rel="noopener">${item.name}</a>
        <span class="prod-brand">${item.brand}</span>
      </span>
      <span class="discount-price">
        <span class="price-final">${fmtPrice(item.finalPrice)}</span>
        <span class="price-orig">${fmtPrice(item.originalPrice)}</span>
      </span>
      <span class="discount">-${item.discountRate}%</span>
    </li>
  `).join("");
}

function renderPriceChart(gender = "all") {
  const el = document.getElementById("price-chart");
  const categories = state.categoryPriceByGender?.categories || {};
  const codes = Object.keys(categories);
  if (!codes.length) { el.innerHTML = "<div class='loading'>데이터 없음</div>"; return; }
  const avgs = codes
    .map(code => ({ cat: categories[code].label, stat: categories[code][gender] }))
    .filter(a => a.stat)
    .map(a => ({ cat: a.cat, n: a.stat.count, avg: a.stat.avg }))
    .sort((x, y) => y.avg - x.avg);
  if (!avgs.length) { el.innerHTML = "<div class='muted-note'>표본이 없습니다.</div>"; return; }
  const max = Math.max(...avgs.map(a => a.avg), 1);
  el.innerHTML = avgs.map(a => `
    <div class="bar-row">
      <div>${a.cat}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${(a.avg / max * 100).toFixed(1)}%"></div></div>
      <div class="bar-value">${a.avg.toLocaleString("ko-KR")}</div>
    </div>
  `).join("");
}

function renderAll() {
  renderCategoryTabs();
  renderRankTable();
  const data = currentPlatformData();
  if (data) {
    renderProductCards("hot-products", data.items.slice(0, 5));
    renderProductCards("new-products", data.items.filter(i => i.change === "NEW"));
  }
  renderDiscountList();
}

async function init() {
  enableDragScroll(document.getElementById("new-products"));

  const [musinsa, cm29, searchTrends, naverTrends, weather, news, meta, categoryPriceByGender] = await Promise.all([
    loadJson("musinsa.json"), loadJson("29cm.json"), loadJson("musinsa_search_trends.json"),
    loadJson("naver_trends.json"), loadJson("weather.json"), loadJson("fashion_news.json"), loadJson("meta.json"),
    loadJson("musinsa_category_price_by_gender.json"),
  ]);
  Object.assign(state, { musinsa, cm29, searchTrends, naverTrends, weather, news, categoryPriceByGender });

  document.getElementById("updated-badge").textContent = meta ? `${timeAgo(meta.updatedAt)} 갱신` : "";
  renderWeather(weather);
  renderNews(news);
  renderKeywords("ms-pop");
  renderAll();
  renderPriceChart();

  document.querySelectorAll("#kw-tabs .tab-btn").forEach(btn => btn.addEventListener("click", () => {
    document.querySelectorAll("#kw-tabs .tab-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    renderKeywords(btn.dataset.kw);
  }));

  document.querySelectorAll("#platform-tabs .tab-btn").forEach(btn => btn.addEventListener("click", () => {
    document.querySelectorAll("#platform-tabs .tab-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    renderAll();
  }));

  document.querySelectorAll("#gender-tabs .tab-btn").forEach(btn => btn.addEventListener("click", () => {
    document.querySelectorAll("#gender-tabs .tab-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    renderPriceChart(btn.dataset.gender);
  }));
}

init();
</script>
